services:
  postgres:
    image: postgres:16
    container_name: postgreSql
    environment:
      POSTGRES_DB: socialdb
      POSTGRES_USER: Mayukh
      POSTGRES_PASSWORD: Sunny

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
